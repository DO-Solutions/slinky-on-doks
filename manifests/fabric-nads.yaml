# NetworkAttachmentDefinitions for DOKS fabric NICs (fabric0-fabric15).
# B300 nodes have 2 fabric NICs per GPU × 8 GPUs = 16 NICs total.
# Each NAD uses the host-device CNI plugin to move the corresponding
# host NIC into the pod network namespace via Multus.
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: roce-net-fabric0
  namespace: slurm
spec:
  config: '{
      "cniVersion": "0.3.1",
      "type": "host-device",
      "device": "fabric0"
    }'
---
